substitutions:
  # Secrets - override via upload.sh
  wifi_ssid: "PLACEHOLDER"
  wifi_password: "PLACEHOLDER"
  mqtt_broker: "PLACEHOLDER"
  mqtt_username: "PLACEHOLDER"
  mqtt_password: "PLACEHOLDER"
  ota_password: "PLACEHOLDER"

  # TEMGO BMS BLE MAC (broadcast publicly — not a secret, just discovered)
  # Identified as JBD BMS, name "FSDD02016J-016", service 0xFF00
  jbd_bms_mac: "10:A5:62:90:E5:75"

esphome:
  name: zamp-monitor
  friendly_name: Zamp UPS Monitor

esp32:
  board: arduino_nano_esp32
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_LOG_COLORS: "n"

wifi:
  ssid: ${wifi_ssid}
  password: ${wifi_password}
  fast_connect: true
  reboot_timeout: 15min

mqtt:
  broker: ${mqtt_broker}
  port: 1883
  username: ${mqtt_username}
  password: ${mqtt_password}
  discovery: true
  discovery_prefix: homeassistant
  discovery_unique_id_generator: mac
  topic_prefix: zamp-ups
  idf_send_async: true
  log_topic: zamp-ups/logs
  reboot_timeout: 15min
  on_connect:
    - logger.log: "MQTT Connected!"
  on_disconnect:
    - logger.log: "MQTT Disconnected!"

ota:
  platform: esphome
  password: ${ota_password}

logger:
  level: INFO

# JBD BMS BLE component (syssi external component).
# Handles the FF00/FF01/FF02 GATT protocol used by the TEMGO's BMS chip.
external_components:
  - source: github://syssi/esphome-jbd-bms@main
    refresh: 0s

# BLE tracker (required by ble_client for the JBD connection)
esp32_ble_tracker:
  scan_parameters:
    active: true
    interval: 320ms
    window: 30ms

ble_client:
  - mac_address: ${jbd_bms_mac}
    id: client_jbd
    auto_connect: true

# JBD BMS instance — talks to the TEMGO over GATT FF00/FF01/FF02
jbd_bms_ble:
  - ble_client_id: client_jbd
    update_interval: 61s
    id: bms0

# Canaduino DOs — kept defined as internal so pins are driven LOW (not floating).
# REL1 = D2 = GPIO 5. Add REL2/REL3/REL4 here if the board variant has them.
switch:
  # --- Velux KLI 311 skylight ---
  # 3 Canaduino relays used as DRY CONTACTS, each wired ACROSS one button's
  # two pads on the 311. Remote is powered by a fixed 3.3V buck converter
  # (was 2xAAA), sharing a supply with the rest of the install — the relay
  # contacts still just short the button pads, they carry no supply current.
  # GPIO->relay map confirmed against ../canaduino-remote/
  # liftmaster-remote.yaml (same Canaduino + Nano ESP32 hardware, relays on
  # GPIO 4-8): D2=GPIO5, D3=GPIO6, D4=GPIO7. Internal: driven only by the
  # skylight cover below. Temporarily set `internal: false` to click an
  # individual relay while bench-wiring the remote.
  - platform: gpio
    pin: 5            # relay 1 = D2 -> button 1  UP / OPEN
    id: sky_open
    internal: true
    restore_mode: ALWAYS_OFF
  - platform: gpio
    pin: 6            # relay 2 = D3 -> button 2  STOP
    id: sky_stop
    internal: true
    restore_mode: ALWAYS_OFF
  - platform: gpio
    pin: 7            # relay 3 = D4 -> button 3  DOWN / CLOSE
    id: sky_close
    internal: true
    restore_mode: ALWAYS_OFF

  # BMS BLE connection toggle — turn OFF to release the JBD's single
  # connection slot so the TEMGO app (or BMS firmware updater) can connect.
  # Turn ON to reclaim the slot for telemetry.
  - platform: ble_client
    ble_client_id: client_jbd
    name: "BMS BLE"
    icon: "mdi:bluetooth-connect"

  # JBD MOSFET controls — OFF on either of these is a real hardware cutoff
  # at the BMS, not a soft limit. Charging OFF blocks current INTO the pack;
  # Discharging OFF blocks current OUT.
  - platform: jbd_bms_ble
    jbd_bms_ble_id: bms0
    charging:
      name: "Charging"
      icon: "mdi:battery-plus"
    discharging:
      name: "Discharging"
      icon: "mdi:battery-minus"

# Velux skylight as a TIME-BASED cover. One-way remote = no position
# feedback, so ESPHome estimates position from travel time: a single ~400ms
# relay tap makes the INTEGRA window run to its end on its own (short press =
# full travel), and open/close_duration let HA show opening/closing/open/
# closed states AND drive it to a partial position (taps open, waits the
# proportional time, taps stop). Time your window full-open and full-close
# with a stopwatch and set the durations to match (they may differ slightly).
# Bump the 400ms tap to ~600ms if a tap ever fails to register.
cover:
  - platform: time_based
    name: "Skylight"
    device_class: window
    open_action:
      - switch.turn_on: sky_open
      - delay: 400ms
      - switch.turn_off: sky_open
    open_duration: 72s
    close_action:
      - switch.turn_on: sky_close
      - delay: 400ms
      - switch.turn_off: sky_close
    close_duration: 70s
    stop_action:
      - switch.turn_on: sky_stop
      - delay: 400ms
      - switch.turn_off: sky_stop

# MQTT buttons for Home Assistant
button:
  - platform: template
    name: "P5 Button - Restart"
    id: btn_restart
    icon: "mdi:restart"
    on_press:
      - logger.log: "Restart requested via P5"
      - delay: 500ms
      - lambda: 'App.safe_reboot();'

# Sensors
sensor:
  - platform: wifi_signal
    name: "WiFi RSSI"
    id: wifi_rssi
    update_interval: 61s
    icon: "mdi:wifi"

  - platform: jbd_bms_ble
    jbd_bms_ble_id: bms0
    total_voltage:
      name: "Pack Voltage"
      filters: &nan_filter
        - filter_out: nan
    current:
      name: "Current"
      filters: *nan_filter
    power:
      name: "Power"
      filters: *nan_filter
    state_of_charge:
      name: "SOC"
      filters: *nan_filter
    capacity_remaining:
      name: "Capacity Remaining"
      filters: *nan_filter
    nominal_capacity:
      name: "Nominal Capacity"
      filters: *nan_filter
    charging_cycles:
      name: "Charging Cycles"
      filters: *nan_filter
    battery_strings:
      name: "Battery Strings"
      filters: *nan_filter
    errors_bitmask:
      name: "Errors Bitmask"
      filters: *nan_filter
    balancer_status_bitmask:
      name: "Balancer Status Bitmask"
      filters: *nan_filter
    cell_voltage_1:
      name: "Cell 1 Voltage"
      filters: *nan_filter
    cell_voltage_2:
      name: "Cell 2 Voltage"
      filters: *nan_filter
    cell_voltage_3:
      name: "Cell 3 Voltage"
      filters: *nan_filter
    cell_voltage_4:
      name: "Cell 4 Voltage"
      filters: *nan_filter
    min_cell_voltage:
      name: "Min Cell Voltage"
      filters: *nan_filter
    max_cell_voltage:
      name: "Max Cell Voltage"
      filters: *nan_filter
    delta_cell_voltage:
      name: "Delta Cell Voltage"
      filters: *nan_filter
    average_cell_voltage:
      name: "Average Cell Voltage"
      filters: *nan_filter
    temperature_1:
      name: "MOSFET Temperature"
      unit_of_measurement: "°F"
      filters:
        - filter_out: nan
        - lambda: return x * 9.0 / 5.0 + 32.0;
    temperature_2:
      name: "Battery Temperature 1"
      unit_of_measurement: "°F"
      filters:
        - filter_out: nan
        - lambda: return x * 9.0 / 5.0 + 32.0;
    temperature_3:
      name: "Battery Temperature 2"
      unit_of_measurement: "°F"
      filters:
        - filter_out: nan
        - lambda: return x * 9.0 / 5.0 + 32.0;

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      id: wifi_ip
      icon: "mdi:ip-network"

  - platform: wifi_info
    ssid:
      name: "WiFi Network"
      id: wifi_network
      icon: "mdi:wifi-cog"

  - platform: jbd_bms_ble
    jbd_bms_ble_id: bms0
    errors:
      name: "BMS Errors"
    operation_status:
      name: "Operation Status"

binary_sensor:
  - platform: jbd_bms_ble
    jbd_bms_ble_id: bms0
    balancing:
      name: "Balancing"
